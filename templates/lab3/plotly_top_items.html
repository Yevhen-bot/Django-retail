<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.plot.ly/plotly-2.34.0.min.js"></script>
</head>

<body>
    <h2>Доходи товарів</h2>

    {{ data|json_script:"chart-data" }}

    <div style="margin-bottom: 20px;">
        <label>Мінімальний дохід: <span id="min-value">0</span></label><br>
        <input id="income-slider" type="range" min="0" max="10000000" step="50000" value="0" style="width: 400px;">
    </div>

    <div id="chart"></div>

    <script>
        const originalData = JSON.parse(document.getElementById('chart-data').textContent);

        function renderChart(filteredData) {
            const trace = {
                x: filteredData.map(x => x.name),
                y: filteredData.map(x => x.total_income),
                mode: 'markers',
                type: 'scatter',
                marker: { size: 12, color: 'blue' }
            };

            const layout = {
                title: "Сумарний дохід по товарах",
                xaxis: { title: "Товар", tickangle: -45 },
                yaxis: { title: "Дохід" },
                margin: { b: 150 }
            };

            Plotly.newPlot('chart', [trace], layout);
        }

        renderChart(originalData);

        const slider = document.getElementById("income-slider");
        const minValueSpan = document.getElementById("min-value");

        slider.addEventListener("input", () => {
            const minIncome = Number(slider.value);
            minValueSpan.textContent = minIncome.toLocaleString();
            const filtered = originalData.filter(x => x.total_income >= minIncome);
            renderChart(filtered);
        });
    </script>
</body>
